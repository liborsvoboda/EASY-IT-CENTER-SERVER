<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="author" content="Libor Svoboda">
    <title>Presentation Designer</title>

    <link rel="stylesheet" href="./css/reveal.css">
    <link rel="stylesheet" href="./lib/css/monokai-sublime.css">
    <link rel="stylesheet" href="./css/font-awesome.min.css">
    <link rel="stylesheet" href="./css/custom.css">
    <link rel="icon" href="./img/img/icon.png" type="image/x-icon">
    <!--<link rel="stylesheet" href="/server-portal/metro/css/metro-all.min.css" />-->

    <script type="text/javascript" crossorigin='anonymous' src="/server-portal/addons/jquery/jquery-3.6.0.min.js"></script>
    <script type="text/javascript" crossorigin='anonymous' src="/server-portal/metro/js/metro.4.5.2.min.js"></script>
    <!-- Printing and PDF exports -->
    <script>
        var link = document.createElement('link');
        link.rel = 'stylesheet';
        link.type = 'text/css';
        link.href = window.location.search.match(/print-pdf/gi) ? 'css/print/pdf.css' : 'css/print/paper.css';
        document.getElementsByTagName('head')[0].appendChild(link);
    </script>
</head>
<body>
    <div id="Presentation" class="reveal">
        <div id="Slides" class="slides">
            <section></section>
        </div>
    </div>

    <script>
        let header = Metro.storage.getItem("RevealPreview", null);
        let sliderData = Metro.storage.getItem("RevealPreviewData", null) != undefined ? Metro.storage.getItem("RevealPreviewData", null) : [];

        if (header.Theme != "") {
            let style = document.createElement('link'); style.id = "InheritStyle"; style.type = "text/css"; style.rel = "stylesheet";
            style.href = `/server-portal/addons/reveal/css/theme/${header.Theme}.css`;
            let iframeHead = document.getElementsByTagName('head')[0];
            iframeHead.appendChild(style);
        }

        let htmlData = "";
        sliderData.forEach((slide, index, arr) => {
            htmlData += `<section id=${slide.Id} ${(slide.EditorType == 'Markdown' ? "data-markdown" : "")} data-transition="${slide.Transition}" data-background-transition="${slide.BackTransition}" >${slide.Data}</section>`;

            if (index == arr.length - 1) { $("#Slides").html(htmlData); }
        });
    </script>

    <script src="./lib/js/head.min.js"></script>
    <script src="./js/reveal.js"></script>
    <script>
        //options https://revealjs.com/config/
        Reveal.initialize({
            autoPlayMedia: true,
            //transition: 'zoom', // none/fade/slide/convex/concave/zoom
            //transitionSpeed: 'slow', // default/fast/slow
            //backgroundTransition: 'slide',// none/fade/slide/convex/concave/zoom
            pdfSeparateFragments: true,
            preloadIframes: true,
            touch: true,
            autoSlide: header.AutoSlide == "" ? false : header.AutoSlide,
            loop: true,
            history: true,
            controls: true,
            progress: true,
            center: true,

            // More info https://github.com/hakimel/reveal.js#dependencies
            dependencies: [
                { src: 'lib/js/classList.js', condition: function () { return !document.body.classList; } },
                { src: 'plugin/zoom-js/zoom.js', async: true },
                { src: 'plugin/markdown/marked.js', condition: function () { return !!document.querySelector('[data-markdown]'); } },
                { src: 'plugin/markdown/markdown.js', condition: function () { return !!document.querySelector('[data-markdown]'); } },
                { src: 'plugin/notes/notes.js', async: true },
                { src: 'plugin/highlight/highlight.js', async: true, condition: function () { return !!document.querySelector('pre code'); }, callback: function () { hljs.initHighlightingOnLoad(); } }
            ],
            keyboard: {
                39: 'next',
                37: 'prev'
            }
        });
    </script>
</body>
</html>
