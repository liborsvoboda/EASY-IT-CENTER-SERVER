    <script>
        //Global Variables
        dataJs = null;
        EditorInit = null;
        Files = [];

        async function StartUp() {
            dataJs = await fetch('/server-portal/addons/monaco/js/userFiles.js').then((r) => r.text())
            new Function(dataJs)(); Metro.storage.setItem("SelectedEditor", "Monaco");
            InitiateTree();
        }


        function InitiateTree() {
            $("#DataTree").fancytree({
                extensions: ["contextMenu"],
                checkbox: false,
                quicksearch: true,
                source: {
                    url: "/PublicStorageService/GetPublicStorage"
                },
                activate: function (event, data) {
                    //console.log("activate", event, data, data.node.data.extension);

                    //Show Text Files ServerParam["TextFilesExtensionList"]
                    if (["js", "html", "css", "txt"].includes(data.node.data.extension)) {
                        SetEditor("Monaco");
                        if (Metro.storage.getItem("SelectedEditor", null) == null || Metro.storage.getItem("SelectedEditor", null) == "Monaco") {
                            Gs.Variables.monacoEditorList.filter(obj => {
                                return obj.elementId == "userFilesPreview"
                            })[0].editor.getModel().setValue(data.node.key);
                        } else if (Metro.storage.getItem("SelectedEditor", null) == "TinyMCE") {
                            tinymce.get('TinyMCE').setContent(data.node.key);
                        } else if (Metro.storage.getItem("SelectedEditor", null) == "Froala") {
                            EditorInit.html.set(data.node.key);
                        } else if (Metro.storage.getItem("SelectedEditor", null) == "SUNEdit") {
                            EditorInit.setContents(data.node.key);
                        } else if (Metro.storage.getItem("SelectedEditor", null) == "Summer") {
                            $(`#SummerEditor`).summernote(`code`, data.node.key);
                        }

                    } else if (["md"].includes(data.node.data.extension)) {
                        SetEditor("MDEditor");
                    } else if (["json"].includes(data.node.data.extension)) {
                        SetEditor("JSONEditor");
                    } else if (["jpg", "jpeg", "png", "tiff", "bmp", "gif", "svg"].includes(data.node.data.extension)) {
                        SetEditor("Image");
                    } else if (["mp4", "avi", "mov"].includes(data.node.data.extension)) {
                        SetEditor("Video");
                    } else if (["mp3"].includes(data.node.data.extension)) {
                        SetEditor("Audio");
                    } else if (["stl"].includes(data.node.data.extension)) {
                        SetEditor("STLviewer");
                    } else if (["pdf"].includes(data.node.data.extension)) {
                        SetEditor("PDFviewer");
                    } else if (["xls"].includes(data.node.data.extension)) { 
                        SetEditor("XLSEditor");
                    } else {
                        SetEditor("Other");
                    }
                },
                checkbox: function (event, data) {
                    return data.node.isFolder() ? false : false;
                },
                contextMenu: {
                    autoFocus: true,
                    menu: function (node) {
                        if (node.folder && node.data.path != "Downloads" && node.data.path != "Videos" && node.data.path != "Images" && node.data.path != "Audio") {
                            return {
                                "createFolder": { "name": "Create Folder", "icon": "add" },
                                "moveFolder": { "name": "Move to Folder", "icon": "edit" },
                                "copyFolder": { "name": "Copy to Folder", "icon": "copy" },
                                "clearFolder": { "name": "Clear Folder", "icon": "delete" },
                                "deleteFolder": { "name": "Delete Folder", "icon": "quit" },
                                "sep1": "---------",
                                "downloadFolder": { "name": "Download Folder (Zip)", "icon": "paste" },
                                "sep2": "---------",
                                "createFile": { "name": "Create File", "icon": "add" },
                                "uploadFiles": { "name": "Upload Files", "icon": "add" },
                                "sep3": "---------",
                                "replaceInFiles": { "name": "Replace in Files", "icon": "add" },
                                "generateSummary": { "name": "Generate Summary.md", "icon": "add" },
                            };
                        } else if (node.folder && node.data.path == "Audio") {
                            return {
                                "createFolder": { "name": "Create Folder", "icon": "add" },
                                "moveFolder": { "name": "Move to Folder", "icon": "edit" },
                                "copyFolder": { "name": "Copy to Folder", "icon": "copy" },
                                "clearFolder": { "name": "Clear Folder", "icon": "delete" },
                                "deleteFolder": { "name": "Delete Folder", "icon": "quit" },
                                "sep1": "---------",
                                "downloadFolder": { "name": "Download Folder (Zip)", "icon": "paste" },
                                "sep2": "---------",
                                "createFile": { "name": "Create File", "icon": "add" },
                                "uploadFiles": { "name": "Upload Files", "icon": "add" },
                                "sep3": "---------",
                                "recordAudio": { "name": "Record Audio", "icon": "add" },
                            };
                        } else if (node.folder && node.data.path == "Images") {
                            return {
                                "createFolder": { "name": "Create Folder", "icon": "add" },
                                "moveFolder": { "name": "Move to Folder", "icon": "edit" },
                                "copyFolder": { "name": "Copy to Folder", "icon": "copy" },
                                "clearFolder": { "name": "Clear Folder", "icon": "delete" },
                                "deleteFolder": { "name": "Delete Folder", "icon": "quit" },
                                "sep0": "---------",
                                "downloadHtmlFromUrl": { "name": "Get Html From Url", "icon": "add" },
                                "downloadMdFromUrl": { "name": "Get MD From Url", "icon": "add" },
                                "downloadPdfFromUrl": { "name": "Get Pdf From Url", "icon": "add" },
                                "downloadImageFromUrl": { "name": "Get Image From Url", "icon": "add" },
                                "sep1": "---------", "downloadFolder": { "name": "Download Folder (Zip)", "icon": "paste" },
                                "sep2": "---------", "createFile": { "name": "Create File", "icon": "add" },
                                "uploadFiles": { "name": "Upload Files", "icon": "add" },
                                "sep3": "---------",
                                "takeSnapshot": { "name": "Take SnapShot", "icon": "add" },
                            };
                        } else if (node.folder && node.data.path == "Downloads") {
                            return {
                                "createFolder": { "name": "Create Folder", "icon": "add" },
                                "moveFolder": { "name": "Move to Folder", "icon": "edit" },
                                "copyFolder": { "name": "Copy to Folder", "icon": "copy" },
                                "clearFolder": { "name": "Clear Folder", "icon": "delete" },
                                "deleteFolder": { "name": "Delete Folder", "icon": "quit" },
                                "sep0": "---------",
                                "downloadHtmlFromUrl": { "name": "Get Html From Url", "icon": "add" },
                                "downloadMdFromUrl": { "name": "Get MD From Url", "icon": "add" },
                                "downloadPdfFromUrl": { "name": "Get Pdf From Url", "icon": "add" },
                                "downloadImageFromUrl": { "name": "Get Image From Url", "icon": "add" },
                                "downloadFolder": { "name": "Download Folder (Zip)", "icon": "paste" },
                                "sep2": "---------",
                                "createFile": { "name": "Create File", "icon": "add" },
                                "uploadFiles": { "name": "Upload Files", "icon": "add" },
                                "replaceInFiles": { "name": "Replace in Files", "icon": "add" },
                                "sep3": "---------",
                                "generateSummary": { "name": "Generate Summary.md", "icon": "add" },
                            };
                        } else if (node.folder && node.data.path == "Videos") {
                            return {
                                "createFolder": { "name": "Create Folder", "icon": "add" },
                                "moveFolder": { "name": "Move to Folder", "icon": "edit" },
                                "copyFolder": { "name": "Copy to Folder", "icon": "copy" },
                                "clearFolder": { "name": "Clear Folder", "icon": "delete" },
                                "deleteFolder": { "name": "Delete Folder", "icon": "quit" },
                                "sep1": "---------", "downloadFolder": { "name": "Download Folder (Zip)", "icon": "paste" },
                                "sep2": "---------", "createFile": { "name": "Create File", "icon": "add" },
                                "uploadFiles": { "name": "Upload Files", "icon": "add" },
                                "sep3": "---------",
                                "recordDesktop": { "name": "Record Desktop", "icon": "add" },
                                "recordCamera": { "name": "Record Camera", "icon": "add" },
                            };
                            //files
                        } else if (!node.folder && node.data.path.endsWith(".html")) {
                            return {
                                "saveFile": { "name": "Save File", "icon": "paste" },
                                "moveFile": { "name": "Move to Folder\\File", "icon": "paste" },
                                "copyFile": { "name": "Copy to Folder\\File", "icon": "copy" },
                                "deleteFile": { "name": "Delete File", "icon": "delete" },
                                "sep1": "---------",
                                "openInNewWindow": { "name": "Open in New Window", "icon": "paste" },
                                "downloadFile": { "name": "Download File (Zip)", "icon": "paste" },
                                "convertToMd": { "name": "Convert To Md", "icon": "add" },
                            };
                        } else if (!node.folder && node.data.path.endsWith(".zip")) {
                            return {
                                "saveFile": { "name": "Save File", "icon": "paste" },
                                "moveFile": { "name": "Move to Folder\\File", "icon": "paste" },
                                "copyFile": { "name": "Copy to Folder\\File", "icon": "copy" },
                                "deleteFile": { "name": "Delete File", "icon": "delete" },
                                "sep1": "---------",
                                "downloadFile": { "name": "Download File (Zip)", "icon": "paste" },
                                "unpackArchive": { "name": "Unpack Archive", "icon": "add" },
                            };
                        } else if (!node.folder && (node.data.path.endsWith(".png") || node.data.path.endsWith(".jpeg") || node.data.path.endsWith(".jpg") || node.data.path.endsWith(".tiff") || node.data.path.endsWith(".bmp") || node.data.path.endsWith(".svg"))) {
                            return {
                                "saveFile": { "name": "Save File", "icon": "paste" },
                                "moveFile": { "name": "Move to Folder\\File", "icon": "paste" },
                                "copyFile": { "name": "Copy to Folder\\File", "icon": "copy" },
                                "deleteFile": { "name": "Delete File", "icon": "delete" },
                                "sep1": "---------",
                                "downloadFile": { "name": "Download File (Zip)", "icon": "paste" },
                                "sep2": "---------",
                                "MiniPaint": { "name": "Edit in MiniPaint", "icon": "paste" },
                            };
                        } else if (!node.folder) {
                            return {
                                "saveFile": { "name": "Save File", "icon": "paste" },
                                "moveFile": { "name": "Move to Folder\\File", "icon": "paste" },
                                "copyFile": { "name": "Copy to Folder\\File", "icon": "copy" },
                                "deleteFile": { "name": "Delete File", "icon": "delete" },
                                "sep1": "---------", "downloadFile": { "name": "Download File (Zip)", "icon": "paste" }, 
                            };
                        }
                    },
                    actions: async function (node, action, options) {
                        if (action == "replaceInFiles") {
                            let content = "<div><input id='FileMask' type='text' data-role='input' data-prepend='FileMask: *.*' ><textarea id='SourceContent' data-role='textarea' data-default-value='Find string'></textarea><textarea id='TargetContent' data-role='textarea' data-default-value='Replace string'></textarea><INPUT id='RootDirOnly' style='HEIGHT: auto' autocomplete='off' data-role='checkbox' data-caption='Root Directory Only'></div>";
                            let actions = [{
                                caption: "Replace", cls: "js-dialog-close success",
                                onclick: async function () {
                                    await Gs.Apis.RunServerPostApi("PublicStorageService/ReplaceInFiles", { FileMask: $("#FileMask").val(), SourceContent: $("#SourceContent").val(), TargetContent: $("#TargetContent").val(), WebRootPath: node.data.path, RootDirectoryOnly: $("#RootDirOnly").val('checked')[0].checked }, null, "ReloadUserStorage");
                                }
                            }, { caption: "Cancel", cls: "js-dialog-close alert", onclick: function () { } }]
                            Gs.Objects.CreateDialogRequest("Replace In Files", content, actions);

                        } else if (action == "openInNewWindow") {
                            let path = Metro.storage.getItem('ApiOriginSuffix', null);
                            window.open(`${path}server-users/public/${node.data.path}`);

                        } else if (action == "recordAudio") {
                            let content = "<div><input id='Filename' type='text' data-role='input' data-prepend='Filename:' ><BUTTON class='button success outline shadowed' onclick=Gs.Media.StartRecordAudio(); >Start</BUTTON><BUTTON onclick ='Gs.Media.StopRecordAudio()' class='button warning outline shadowed'> Stop</BUTTON></div>";
                            let actions = [{
                                caption: "Save Audio File", cls: "js-dialog-close success",
                                onclick: async function () {
                                    if ($("#Filename").val().length > 0) {
                                        let filename = $("#Filename").val();
                                        let blob = await fetch(Metro.storage.getItem("CapturedAudio", null)).then(r => r.blob());
                                        let reader = new FileReader(); 
                                        reader.onload = async function () {
                                            var dataURL = reader.result; localStorage.setItem(":CapturedAudio", dataURL);
                                            await Gs.Apis.RunServerPostApi("PublicStorageService/SaveMediaFile", { Path: "Audio", Filename: filename, Content: localStorage.getItem(":CapturedAudio", null) }, null, "ReloadUserStorage");
                                            Gs.Media.ClearCapturedAudio();
                                        }
                                        //reader.readAsArrayBuffer(blob);
                                        reader.readAsDataURL(blob);
                                        //reader.readAsText(blob);
                                    } else { alert("Data must be Inserted"); }
                                }
                            }, { caption: "Cancel", cls: "js-dialog-close alert", onclick: function () { } }]
                            Gs.Objects.CreateDialogRequest("Save Audio File", content, actions);

                        } else if (action == "takeSnapshot") {
                            let content = "<div><input id='Filename' type='text' data-role='input' data-prepend='Filename:' ></div>";
                            let actions = [{
                                caption: "Take SnapShot", cls: "js-dialog-close success",
                                onclick: async function () {
                                    if ($("#Filename").val().length > 0) {
                                        await Gs.Media.CaptureToImage();
                                        await Gs.Apis.RunServerPostApi("PublicStorageService/SaveMediaFile", { Path: "Images", Filename: $("#Filename").val(), Content: Metro.storage.getItem("CapturedImage", null) }, null, "ReloadUserStorage");
                                        Gs.Media.ClearCapturedImage();
                                    } else { alert("Data must be Inserted"); }
                                }
                            }, { caption: "Cancel", cls: "js-dialog-close alert", onclick: function () { } }]
                            Gs.Objects.CreateDialogRequest("Take SnapShot", content, actions);

                        } else if (action == "recordDesktop") {
                            let content = "<div><input id='Filename' type='text' data-role='input' data-prepend='Filename:' ></div>";
                            let actions = [{
                                caption: "Start Record Desktop", cls: "js-dialog-close success",
                                onclick: async function () {
                                    if ($("#Filename").val().length > 0) {
                                        Gs.Media.StartPublicCaptureScreen($("#Filename").val());
                                    } else { alert("Data must be Inserted"); }
                                }
                            }, {
                                caption: "Cancel", cls: "js-dialog-close alert", onclick: function () {

                                    }
                                }]
                            Gs.Objects.CreateDialogRequest("Record Desktop", content, actions);

                        } else if (action == "recordCamera") {
                            let content = "<div><input id='Filename' type='text' data-role='input' data-prepend='Filename:' ><video id='videoPreview' autoplay style='width:430px;'></video><BUTTON class='button success outline shadowed' onclick=Gs.Media.StartCaptureCamera(); >Start</BUTTON><BUTTON onclick ='Gs.Variables.media.mediaRecorder.stop();Gs.Variables.media.mediaStream.getTracks().forEach(track=>{ track.stop()})' class='button warning outline shadowed'> Stop</BUTTON></div>";
                            let actions = [{
                                caption: "Save Video", cls: "js-dialog-close success",
                                onclick: async function () {
                                    if ($("#Filename").val().length > 0) {
                                        await Gs.Apis.RunServerPostApi("PublicStorageService/SaveMediaFile", { Path: "Videos", Filename: $("#Filename").val(), Content: Metro.storage.getItem("CapturedVideo", null) }, null, "ReloadUserStorage");
                                        Gs.Media.ClearCapturedVideo();
                                    } else { alert("Data must be Inserted"); }
                                }
                            }, {
                                caption: "Cancel", cls: "js-dialog-close alert", onclick: function () {

                                }
                            }]

        function ReloadUserStorage() {
            SetEditor("");
            $('#DataTree').fancytree('option', 'source', { url: "/PublicStorageService/GetPublicStorage" });
        }


        function LoadFiles() {
            let fileList = document.getElementById("Files").files;
            Files = [];
            for (let i = 0; i < fileList.length; i++) {
                let reader = new FileReader();
                reader.onload = function () { Files.push({ Filename: fileList[i].name, Content: reader.result }); }
                reader.readAsDataURL(fileList[i]); 
            }
        }


        async function SetEditor(editor) {
            Metro.storage.setItem("SelectedEditor", editor);

            //CLEAN EDITOR
            if (Gs.Variables.monacoEditorList.length > 1) { Gs.Variables.monacoEditorList = []; } $("#MonacoTheme").hide(); $("#MonacoLanguage").hide();
            Gs.Functions.RemoveClass('SetMonaco', 'disabled'); Gs.Functions.RemoveClass('SetTinyMCE', 'disabled'); Gs.Functions.RemoveClass('SetFroala', 'disabled');
            Gs.Functions.RemoveClass('SetSUNEdit', 'disabled'); Gs.Functions.RemoveClass('SetSummer', 'disabled'); Gs.Functions.RemoveClass('SetMDEditor', 'disabled');
            Gs.Functions.RemoveClass('SetJSONEditor', 'disabled'); Gs.Functions.RemoveClass('FrameWindow', 'fr-fullscreen-wrapper'); EditorInit = null;

            //SET EDITOR
            switch (editor) {
                case "MiniPaint":
                    $("#FrameWindow").html('<iframe id="IFrameWindow" src="/server-portal/addons/minipaint/index.html" width="100%" height="100%" frameborder="0" scrolling="yes" style="width:100%; height:calc(100vh);"></iframe>');
                    let sourceImage = Metro.storage.getItem('ApiOriginSuffix', null) + $('#DataTree').fancytree("getActiveNode").key;
                    console.log("key", $('#DataTree').fancytree("getActiveNode"));
                    setTimeout(function () {
                        let toDataURL = url => fetch(url)
                            .then(response => response.blob())
                            .then(blob => new Promise((resolve, reject) => {
                                const reader = new FileReader()
                                reader.onloadend = () => resolve(reader.result)
                                reader.onerror = reject
                                reader.readAsDataURL(blob)
                            }));
                        toDataURL(Metro.storage.getItem('ApiOriginSuffix', null) + $('#DataTree').fancytree("getActiveNode").key)
                            .then(dataUrl => {
                                console.log('RESULT:', dataUrl)
                                $("#IFrameWindow")[0].contentWindow.FileOpen.open_resource(dataUrl)
                            })
                    }, 3000);
                    break;
                case "XLSEditor":

                    fetch($('#DataTree').fancytree("getActiveNode").key).then(response => response.blob())
                        .then(blob => {
                            var reader = new FileReader();
                            reader.onload = function (e) {
                                var cfb = XLS.CFB.read(blob, { type: 'binary' });
                                var wb = XLS.parse_xlscfb(cfb);
                                wb.SheetNames.forEach(function (sheetName) {
                                    var CSVdata = XLS.utils.make_csv(wb.Sheets[sheetName]);
                                    var JsonData = XLS.utils.sheet_to_row_object_array(wb.Sheets[sheetName]);
                                    $("#FrameWindow").html('<div class="row" style="height: 100%;padding-left: 10px;">' + JsonData + '</div>');

                                });
                            };

                        ], placeholder: 'Zde vytvořte mediální dokument...',
                        templates: [{ name: 'Calendar', html: '<div data-role="calendar"></div>' }, { name: 'Donut', html: '<div id="donut3" data-role="donut" data-value="35" data-hole=".6" data-stroke="#f5f5f5" data-fill="#9C27B0" data-animate="10" ></div> ' }],
                        codeMirror: CodeMirror,katex: katex
                    });
                    setTimeout(function () {
                        if ($('#DataTree').fancytree("getActiveNode") != null) { EditorInit.setContents($('#DataTree').fancytree("getActiveNode").key); }
                    }, 1000);
                    break;
                case "Summer":
                    Gs.Functions.AddClass('SetSummer', 'disabled'); 
                    $("#FrameWindow").html('<div id="SummerEditor" style="width: 100%;"></div> ');
                    $(`#SummerEditor`).summernote({
                        tabsize: 2, width: 1200, height: 800, maxHeight: 1200, lang: `cs-CZ`,
                        placeholder: `write Description...`,
                        toolbar: [[`style`, [`style`]], [`font`, [`bold`, `underline`, `clear`]], [`fontname`, [`fontname`]],
                        [`fontsize`, [`fontsize`]], [`color`, [`color`]], [`para`, [`ul`, `ol`, `paragraph`]], [`table`, [`table`]],
                        [`insert`, [`link`, `picture`, `video`]], [`view`, [`fullscreen`, `codeview`, `undo`, `redo`, `help`]]]
                    });
                    setTimeout(function () {
                        if ($('#DataTree').fancytree("getActiveNode") != null) { $(`#SummerEditor`).summernote(`code`, $('#DataTree').fancytree("getActiveNode").key); }
                    }, 1000);
                    break;
                case "Preview":
                    $("#FrameWindow").html(Gs.Variables.monacoEditorList.filter(obj => { return obj.elementId == "userFilesPreview" })[0].model.getValue());

                default:
            }

        }



    </script>
