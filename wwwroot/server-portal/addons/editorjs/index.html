<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Media Documentation</title>
  <link href="./dist/css/css.css" rel="stylesheet">
  <link href="./dist/css/demo.css" rel="stylesheet">
  <script src="./dist/js/json-preview.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
</head>
<body>
	<div class="ce-example">
		<div id="editorjs"></div>
	</div>

	<script src="./dist/js/attaches.js"></script><!-- Attaches -->
	<script src="./dist/js/header.js"></script><!-- Header -->
	<script src="./dist/js/blob-image.js"></script><!-- blob Image -->
	<script src="./dist/js/carousel.js"></script><!--caerousel Image -->
	<script src="./dist/js/raw.js"></script><!--raw -->
	<script src="./dist/js/personality.js"></script><!--personality card -->
	<script src="./dist/js/delimiter.js"></script><!-- Delimiter -->
	<script src="./dist/js/list.js"></script><!-- List -->
	<script src="./dist/js/checklist.js"></script><!-- Checklist -->
	<script src="./dist/js/quote.js"></script><!-- Quote -->
	<script src="./dist/js/code.js"></script><!-- Code -->
	<script src="./dist/js/codeTool.js"></script><!-- Code -->
	<script src="./dist/js/embed.js"></script><!-- Embed -->
	<script src="./dist/js/table.js"></script><!-- Table -->
	<script src="./dist/js/link.js"></script><!-- Link -->
	<script src="./dist/js/warning.js"></script><!-- Warning -->
	<script src="./dist/js/inline-image.js"></script><!-- url image -->
	<script src="./dist/js/url-image.js"></script><!-- url image -->
	<script src="./dist/js/marker.js"></script><!-- Marker -->
	<script src="./dist/js/inline-code.js"></script><!-- Inline Code -->
	<script src="./dist/js/footnotes.js"></script><!-- FooTones -->
	<script src="./dist/js/paragraph.js"></script><!-- FooTones -->
	<script src="./dist/js/mermaid.js"></script><!-- mermaid -->
	<script src="./dist/js/gallery.umd.js"></script><!-- gallery -->
	<script src="./dist/js/sortable.js"></script><!-- sort gallery -->
	<script src="./dist/js/codemirror.js"></script><!-- codemirror -->
	<script src="./dist/js/codeflask.js"></script><!-- codeflask -->
	<script src="./dist/js/style.js"></script><!-- style -->
	<script src="./dist/js/tooltip.js"></script><!-- tooltip -->
	<script src="./dist/js/color.js"></script>
	<script src="./dist/js/annotation.js"></script>
	<script src="./dist/js/blocktune.js"></script>
	<script src="./dist/js/editorjs.umd.js"></script>


	<script>
		const config = {
			shortcuts: {
				undo: 'CMD+X',
				redo: 'CMD+ALT+C'
			}
		}

		var editor = new EditorJS({
			readOnly: false,
			holder: 'editorjs',
			inlineToolbar: ['link', 'marker', 'bold', 'italic'],
			inlineToolbar: true,
			tools: {


				Color: {
				  class: ColorPlugin, // if load from CDN, please try: window.ColorPlugin
				  config: {
					 colorCollections: ['#EC7878','#9C27B0','#673AB7','#3F51B5','#0070FF','#03A9F4','#00BCD4','#4CAF50','#8BC34A','#CDDC39', '#FFF'],
					 defaultColor: '#FF1300',
					 type: 'text',
					 hasCustomPicker: true // add a button to allow selecting any colour
				  }
				},
				Marker: {
				  class: ColorPlugin, // if load from CDN, please try: window.ColorPlugin
				  config: {
					 defaultColor: '#FFBF00',
					 type: 'marker',
					 icon: `<svg fill="#000000" height="200px" width="200px" version="1.1" id="Icons" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 32 32" xml:space="preserve"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <g> <path d="M17.6,6L6.9,16.7c-0.2,0.2-0.3,0.4-0.3,0.6L6,23.9c0,0.3,0.1,0.6,0.3,0.8C6.5,24.9,6.7,25,7,25c0,0,0.1,0,0.1,0l6.6-0.6 c0.2,0,0.5-0.1,0.6-0.3L25,13.4L17.6,6z"></path> <path d="M26.4,12l1.4-1.4c1.2-1.2,1.1-3.1-0.1-4.3l-3-3c-0.6-0.6-1.3-0.9-2.2-0.9c-0.8,0-1.6,0.3-2.2,0.9L19,4.6L26.4,12z"></path> </g> <g> <path d="M28,29H4c-0.6,0-1-0.4-1-1s0.4-1,1-1h24c0.6,0,1,0.4,1,1S28.6,29,28,29z"></path> </g> </g></svg>`
					}
				},

				/*codeBox: {
				  class: CodeBox,
				  config: {
					themeURL: 'https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@9.18.1/build/styles/dracula.min.css', // Optional
					themeName: 'atom-one-dark', // Optional
					useDefaultTheme: 'light' // Optional. This also determines the background color of the language select drop-down
				  }
				},*/
				annotation: Annotation,
				tooltip: {
					class: Tooltip,
					config: {
						location: 'left',
						underline: true,
						placeholder: 'Enter a tooltip',
						highlightColor: '#FFEFD5',
						backgroundColor: '#154360',
						textColor: '#FDFEFE',
						holder: 'editorId',
					}
				},
				style: EditorJSStyle.StyleInlineTool,
				code: editorjsCodeflask,
				gallery: {
					class: ImageGallery,
					config: {
						sortableJs: Sortable,
						endpoints: {
                            byFile: window.location.origin + '/FileUploadService/UploadEditorJSImage',
						}
					},
				},
				mermaid: MermaidTool,
				paragraph: {
					class: Paragraph,
					inlineToolbar: true,
				},
				footnotes: {
					class: FootnotesTune,
					config: {
						placeholder: 'Your placeholder for footnotes popover',
						shortcut: 'CMD+SHIFT+F',
					},
				},
                code: {
                    class: CodeTool,
                    config: {
                        additionalLanguages: [
							{ name: 'C#', code: 'csharp' },
							{ name: 'JavaScript', code: 'js' },
							{ name: 'CSS', code: 'css' },
							{ name: 'SQL', code: 'sql' },
                            { name: 'HTML', code: 'html' },
                        ]
                    }
                },
				carousel: {
					class: Carousel,
					config: {
						endpoints: {
                            byFile: window.location.origin + '/FileUploadService/UploadEditorJSImage',
						}
					}
				},
				list: {
					class: List,
					inlineToolbar: true,
				},
				paragraph: {
					class: Paragraph,
					inlineToolbar: true,
					tunes: ['anyTuneName'],
				},
				anyTuneName: {
					class: AlignmentBlockTune,
					config: {
						default: "right",
						blocks: {
							header: 'center',
							list: 'right'
						}
					},
				},
				header: {
					class: Header,
					inlineToolbar: ['marker', 'link'],
					config: {
						placeholder: 'Header'
					},
					shortcut: 'CMD+SHIFT+H'
				},
				raw: RawTool,
				personality: {
					class: Personality,
					config: {
                        endpoint: window.location.origin + '/FileUploadService/UploadEditorJSImage'
					}
				},
				image: BlobImage,
				urlimage: {
					class: UrlImage,
					inlineToolbar: true,
					config: {
						placeholder: 'Paste image URL'
					}
				},
				blocklist: {
					class: List,
					inlineToolbar: true,
					shortcut: 'CMD+SHIFT+L'
				},
				checklist: {
					class: Checklist,
					inlineToolbar: true,
				},
				quote: {
					class: Quote,
					inlineToolbar: true,
					config: {
						quotePlaceholder: 'Enter a quote',
						captionPlaceholder: 'Quote\'s author',
					},
					shortcut: 'CMD+SHIFT+O'
				},
				warning: Warning,
				marker: {
					class: Marker,
					shortcut: 'CMD+SHIFT+M'
				},
				code: {
					class: CodeTool,
					shortcut: 'CMD+SHIFT+C'
				},
				delimiter: Delimiter,
				inlineCode: {
					class: InlineCode,
					shortcut: 'CMD+SHIFT+C'
				},
				linkTool: LinkTool,
                embed: {
                    class: Embed,
                    inlineToolbar: false,
                    config: {
                        services: {
                            youtube: true
                        }
                    }
                },
				table: {
					class: Table,
					inlineToolbar: true,
					shortcut: 'CMD+ALT+T'
				},
				attaches: {
					class: AttachesTool,
					config: {
                        endpoint: window.location.origin + '/FileUploadService/UploadEditorJSFile'
					}
				},
			},
			defaultBlock: 'paragraph',

			data: {
				blocks: [
					{
						type: "header",
						data: {
							text: "Media Document",
							level: 2
						}
					},
					{
						type: 'paragraph',
						data: {
							text: 'Create Media document. Insert Images, Graphs, Code, Table, Attachments, and more for Modern Document.'
						}
					},
				]
			},

			//editor.configuration.data
			onReady: function () {
				MermaidTool.config({ 'theme': 'neutral' });
			},
			onChange: function (api, event) {
			}
		});

	</script>
</body>
</html>
