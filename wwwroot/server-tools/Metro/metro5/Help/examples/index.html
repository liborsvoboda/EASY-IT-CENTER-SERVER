<html>
<head>
	<meta name="robots" content="noindex,follow">
	<meta name="charset" content="utf-8" />

	<link rel="stylesheet" href="../lib/skin-win8/ui.fancytree.min.css">
	<link rel="stylesheet" href="../lib/metro.css" />

	<script type="text/javascript" src="../lib/jquery-3.6.0.min.js"></script>
	<script type="text/javascript" src="../lib/fancytree-all-deps.js"></script>
	<script type="text/javascript" src="../lib/metro.js"></script>

	<title>Fancytree - Browser</title>
	<script type="text/javascript">
		$(function () {
			$("#tree").fancytree({
				checkbox: false,
				source: {
                    url: "/server-library/MetroDocs/Metro5/Docs/lib/jsondata.json"
				},
				activate: function (event, data) {
                    $("#FrameWindow").html("<iframe id=IFrameWindow src='" + data.node.key + "' class='h-100' height='100%' frameborder='0' scrolling='yes' style='width:100%; height: 100%;' ></iframe>");
				},
				checkbox: function (event, data) {
					return data.node.isFolder() ? false : false;
				}
			});
		});
	</script>
</head>
<body>
	<div class="row w-100 h-100 d-inline-flex">
		<div id="tree" class="h-100" style="width: 300px !important; overflow-y: auto;"></div>
		<div id="FrameWindow" class="h-100" height="100%" frameborder="0" scrolling="yes" style="width: calc(100% - 300px);height: 100% !important;position: absolute;top: 0px;left: 300px;"></div>
	</div>
</body>

</html>
