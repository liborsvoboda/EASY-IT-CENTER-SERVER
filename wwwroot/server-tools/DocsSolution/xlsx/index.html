<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <title>XLSX Viewer</title>
</head>
<body>
    <div id="viewer">

            No sheet selected. Please select a sheet.

    </div>

    <script type="text/javascript" src="/server-tools/Metro/metro4/js/jquery-3.6.0.min.js"></script>

    <!--Export Table-->

    <script type="text/javascript" src="/server-tools/DocsSolution/alldocsexport/libs/html2canvas/html2canvas.min.js"></script>

    <script type="text/javascript" src="/server-tools/DocsSolution/alldocsexport/libs/jsPDF-AutoTable/jspdf.plugin.autotable.js"></script>
    <script type="text/javascript" src="/server-tools/DocsSolution/alldocsexport/tableExport.js"></script>

    <input id="SourceFile" type="file" data-role="file" data-on-file-create="getFile" style="display:none" />
    <script type="text/javascript" src="./js/xlsx.full.min.js"></script>
    <script type="text/javascript" src="./js/script.js"></script>

</html>
