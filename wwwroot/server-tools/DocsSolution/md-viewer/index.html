
<!DOCTYPE html>
<html>
<head>
    <title>MarkDown Viewer</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="text/javascript" src="./js/4.0.5_es5-shim.min.js"></script>
    <script type="text/javascript" src="./js/jquery-3.6.0.min.js"></script>
    <script type="text/javascript" src="./js/2.4.1_lodash.js"></script>
    <script type="text/javascript" src="./js/3.2.0_js_bootstrap.min.js"></script>
    <link rel="stylesheet" href="./css/3.2.0_css_bootstrap.css">
    <link rel="stylesheet" href="./css/9.1.0_styles_github.min.css">
    <script type="text/javascript" src="./js/markdown-it.js"></script>
    <script type="text/javascript" src="./js/14.0.2_dist_twemoji.min.js"></script>
    <link rel="stylesheet" href="./css/index.css">
    <script type="text/javascript" src="./js/index.js"></script>
    <script type="text/javascript" src="./js/metro.4.5.2.min.js"></script>
    <script type="text/javascript" src="./js/highlightjs/highlight.pack.js"></script>
    <script type="text/javascript" src="./js/highlightjs/highlightjs-badge.js"></script>
    <script type="text/javascript" src="./js/mermaid.min.cdn.js"></script>
    <script>
        $(document).ready(function () {
            $('#MdContent').val(Metro.storage.getItem('SelectedMenu', null).MdHelp);
            $("#MdContent").trigger("cut");
        });
    </script>

</head>
<body>
    <div class="row full-height">
        <!--<div class="col-xs-6 full-height">
                <div class="demo-control"><a class="source-clear" href="#">clear</a><a id="permalink" href="./" title="Share this snippet as link"><strong>permalink</strong></a></div>
                <textarea id="content" class="source full-height"></textarea>
            </div>-->
        <div class="col-xs-12 full-height" style="position: absolute;">
            <!--<div class="demo-control"><a class="source-clear" href="#">clear</a><a id="permalink" href="./" title="Share this snippet as link"><strong>permalink</strong></a></div>-->
            <textarea id="MdContent" style="display:none;" class="source full-height">
                ### Installation Info
            </textarea>
        </div>
    </div>
    <section class="col-xs-12 full-height" style="position: absolute; top: 0px;">
        <div class="demo-control"><a href="#" data-result-as="html">html</a><a href="#" data-result-as="src">source</a><a href="#" data-result-as="debug">debug</a></div>
        <div class="result-html full-height"></div>
        <pre class="hljs result-src full-height"><code class="result-src-content full-height"></code></pre>
        <pre class="hljs result-debug full-height"><code class="result-debug-content full-height"></code></pre>
    </section>

    <div class="gh-ribbon"><a href="http://KlikneteZde.Cz" target="_blank">KlikneteZde.Cz</a></div>

    <script>
        async function Mermaid() { try { await mermaid.run({ nodes: document.querySelectorAll('.class-mermaid'), }); } catch (err) { } }

        var pres = document.querySelectorAll("pre>code"); pres = document.querySelectorAll("code");
        for (var i = 0; i < pres.length; i++) { hljs.highlightBlock(pres[i]); }
        window.highlightJsBadge();
        $(document).ready(async function () {
            setTimeout(async () => {
                await Mermaid();
            }, 3000);
        });

    </script>
</body>
</html>
