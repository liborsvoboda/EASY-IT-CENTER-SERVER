<html>
<head>
	<meta name="robots" content="noindex,follow">
	<meta name="charset" content="utf-8" />

	<link rel="stylesheet" href="./js/skin-win8/ui.fancytree.min.css">
	<link rel="stylesheet" href="./js/metro-all.css" />
	<link rel="stylesheet" href="./js/contextmenu/jquery.contextMenu.min.css" />


	<script type="text/javascript" src="./js/jquery-3.6.0.min.js"></script>
	<script type="text/javascript" src="./js/fancytree-all-deps.js"></script>
	<script type="text/javascript" crossorigin='anonymous' src="./js/contextmenu/js/jquery.contextMenu.min.js"></script>
	<script type="text/javascript" crossorigin='anonymous' src="./js/contextmenu/js/jquery.fancytree.contextMenu.js"></script>
	<script type="text/javascript" src="./js/metro.4.5.2.min.js"></script>

	<!--GLOBAL FUNCT-->
	<script type="text/javascript" src="/server-portal/manage/js/global-storage.js"></script>
	<script type="text/javascript" src="/server-portal/manage/js/global-behavior.js"></script>
	<script type="text/javascript" src="/server-portal/manage/js/global-object.js"></script>
	<script type="text/javascript" src="/server-portal/manage/js/global-functions.js"></script>
	<script type="text/javascript" src="/server-portal/manage/js/global-api.js"></script>
	<script type="text/javascript" src="/server-portal/manage/js/global-media.js"></script>

	<title>Fancytree - Browser</title>
	<script type="text/javascript">
		$(function () {
            $("#DataTree").fancytree({
                extensions: ["contextMenu"],
				checkbox: false,
				source: {
					url: "/DashboardService/GetLibraryStorage?loadpath=templates/metroexamples"
				},
				activate: function (event, data) {
                    $("#FrameWindow").html("<iframe id=IFrameWindow src='" + (data.node.data.extension.toLowerCase() == "md" ? data.node.key.split('.', data.node.key.split('.').length - 1).join(".") : data.node.key) + "' class='h-100' height='100%' frameborder='0' scrolling='yes' style='width:100%; height: 100%;' ></iframe>");
				},
				checkbox: function (event, data) {
					return data.node.isFolder() ? false : false;
				},
                contextMenu: {
                    autoFocus: true,
                    menu: function (node) {
                        if (node.folder && node.data.path.split("\\").length == 1) {
                            return {
                                //"buySolution": { "name": "Buy Solution 1000Kč", "icon": "add" },
                                "searchInFiles": { "name": "Search in Files", "icon": "paste" },
                                "downloadFolder": { "name": "Download Folder (Zip)", "icon": "paste" },
                            }
                        } else if (!node.folder) {
                            return {

                                "downloadFile": { "name": "Download File (Zip)", "icon": "paste" },
                            }
                        }
                    },
                    actions: async function (node, action, options) {
                        if (action == "searchInFiles") {
                            let content = "<div><input id='SearchInput' type='text' data-role='input' data-prepend='Search Text' ></div>";
                            let actions = [{
                                caption: "Search", cls: "js-dialog-close success",
                                onclick: async function () {
                                    if ($("#SearchInput").val().length > 0) {
                                        await Gs.Apis.RunServerPostApi("DashboardService/SearchInFiles", {
                                            SearchInput: $("#SearchInput").val(), DataPath: `Templates\\MetroExamples\\${node.data.path}`
                                        }, "SearchResultFileList", "SetSearchResult");
                                    } else { alert("Data must be Inserted"); }
                                }
                            }, { caption: "Cancel", cls: "js-dialog-close alert", onclick: function () { } }]
                            Gs.Objects.CreateDialogRequest("Search In Files", content, actions);

                        } else if (action == "downloadFolder") {
                            Gs.Apis.DownloadApi("DashboardService/DownloadLibraryFolder", { Path: `Templates\\MetroExamples\\${node.data.path}` }, node.data.path.split("\\").pop(), true);

                        } else if (action == "downloadFile") {
                            Gs.Apis.DownloadApi("DashboardService/DownloadLibraryFile", { Path: `Templates\\MetroExamples\\${node.data.path}` }, node.data.path.split("\\").pop(), true);

                        } else if (action == "buySolution") {
                            let basketData = Metro.storage.getItem('BasketPriceList', null);
                            basketData.push({ Price: 1000, Path: `Templates\\MetroExamples\\${node.data.path}`, Title: node.data.path.split("\\").pop(), Currency: "CZK" });
                            Metro.storage.setItem('BasketPriceList', basketData);
                            parent.Gs.Behaviors.RefreshBasket();
                        }
                    }
                }
			});
        });

        function SetSearchResult() {
            let fileList = Metro.storage.getItem("SearchResultFileList", null);
            $("#DataTree").fancytree("getRootNode").tree.clear();
            $("#DataTree").fancytree("getRootNode").addChildren(fileList);
        }

        function ReloadUserStorage() {
            $('#DataTree').fancytree('option', 'source', { url: "/DashboardService/GetLibraryStorage?loadpath=templates/metroexamples" });
        }
	</script>
</head>
<body>
    <div class="row w-100 h-100 d-inline-flex">
        <div id="DataTree" class="h-100" style="width: 200px; overflow-y: auto; padding-top: 25px;"></div>
        <div id="FrameWindow" class="h-100" height="100%" frameborder="0" scrolling="yes" style="width: calc(100% - 200px);height:100%;"></div>
        <div id="ActionMenu" class="pos-fixed" style="z-index: 9999999999;">
            <nav data-role="ribbonmenu">
                <ul class="tabs-holder">
                    <li onclick="ReloadUserStorage();" class=""><a href="#">Reload</a></li>
                </ul>
            </nav>
        </div>
    </div>
</body>

</html>
