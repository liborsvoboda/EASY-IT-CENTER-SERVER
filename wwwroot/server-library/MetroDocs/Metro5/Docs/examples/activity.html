<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="../lib/metro.css" rel="stylesheet">

    <title>Test Activity - Metro UI :: Popular HTML, CSS and JS library</title>
</head>
<body class="cloak h-100-vh">
<nav data-role="appbar" class="border-bottom bd-default" data-expand="true">
    <div class="app-bar-item-static no-hover">
        <div class="text-leader">Activities</div>
    </div>
    <div class="app-bar-item-static no-hover ml-auto">
        <input type="checkbox" data-role="theme-switcher"/>
    </div>
</nav>

    <div class="container">
        <h1>Activity test page</h1>

        <div class="row">
            <div class="cell-md-3 text-center">
                <div class="mx-auto" data-role="activity" data-type="ring"></div>
            </div>
            <div class="cell-md-3">
                <div class="mx-auto" data-role="activity" data-type="ring" data-style="color"></div>
            </div>
            <div class="cell-md-3 text-center">
                <div class="mx-auto" data-role="activity" data-type="ring" data-style="color" data-size="64"></div>
            </div>
            <div class="cell-md-3 dark-side bg-dark">
                <div class="mx-auto" data-role="activity" data-type="ring"></div>
            </div>
        </div>

        <div class="row">
            <div class="cell-md-3 p-2">
                <div class="mx-auto" data-role="activity" data-type="metro" data-size="10"></div>
            </div>
            <div class="cell-md-3 p-2">
                <div class="mx-auto" data-role="activity" data-type="metro" data-style="color"></div>
            </div>
            <div class="cell-md-3 p-2">
                <div class="mx-auto" data-role="activity" data-type="metro" data-style="color" data-box-size="20"></div>
            </div>
            <div class="cell-md-3 p-2 dark-side bg-dark">
                <div class="mx-auto" data-role="activity" data-type="metro" data-size="10"></div>
            </div>
        </div>

        <div class="row">
            <div class="cell-md-3 p-2">
                <div class="mx-auto" data-role="activity" data-type="square"></div>
            </div>
            <div class="cell-md-3 p-2">
                <div class="mx-auto" data-role="activity" data-type="square" data-style="color"></div>
            </div>
            <div class="cell-md-3 p-2">
                <div class="mx-auto" data-role="activity" data-type="square" data-style="color" data-size="64"></div>
            </div>
            <div class="cell-md-3 p-2 dark-side bg-dark">
                <div class="mx-auto" data-role="activity" data-type="square"></div>
            </div>
        </div>

        <div class="row">
            <div class="cell-md-3 p-2">
                <div class="mx-auto" data-role="activity" data-type="cycle"></div>
            </div>
            <div class="cell-md-3 p-2">
                <div class="mx-auto" data-role="activity" data-type="cycle" data-style="color"></div>
            </div>
            <div class="cell-md-3 p-2">
                <div class="mx-auto" data-role="activity" data-type="cycle" data-style="color" data-size="64"></div>
            </div>
            <div class="cell-md-3 p-2 dark-side bg-dark">
                <div class="mx-auto" data-role="activity" data-type="cycle"></div>
            </div>
        </div>

        <div class="row">
            <div class="cell-md-3 p-2">
                <div class="mx-auto" data-role="activity" data-type="simple"></div>
            </div>
            <div class="cell-md-3 p-2">
                <div class="mx-auto" data-role="activity" data-type="simple" data-style="color"></div>
            </div>
            <div class="cell-md-3 p-2">
                <div class="mx-auto" data-role="activity" data-type="simple" data-style="color" data-size="64"></div>
            </div>
            <div class="cell-md-3 p-2 dark-side bg-dark">
                <div class="mx-auto" data-role="activity" data-type="simple"></div>
            </div>
        </div>

        <div class="row">
            <div class="cell-md-3 p-2">
                <div class="mx-auto" data-role="activity" data-type="atom"></div>
            </div>
            <div class="cell-md-3 p-2">
                <div class="mx-auto" data-role="activity" data-type="atom" data-style="color"></div>
            </div>
            <div class="cell-md-3 p-2">
                <div class="mx-auto" data-role="activity" data-type="atom" data-style="color" data-size="64"></div>
            </div>
            <div class="cell-md-3 p-2 dark-side bg-dark">
                <div class="mx-auto" data-role="activity" data-type="atom"></div>
            </div>
        </div>

        <div class="row">
            <div class="cell-md-3 p-2">
                <div class="mx-auto" data-role="activity" data-type="bars"></div>
            </div>
            <div class="cell-md-3 p-2">
                <div class="mx-auto" data-role="activity" data-type="bars" data-style="color"></div>
            </div>
            <div class="cell-md-3 p-2">
                <div class="mx-auto" data-role="activity" data-type="bars" data-style="color" data-size="64"></div>
            </div>
            <div class="cell-md-3 p-2 dark-side bg-dark">
                <div class="mx-auto" data-role="activity" data-type="bars"></div>
            </div>
        </div>
    </div>

    <div class="example text-center mt-20">
        <button class="button" onclick="
                        Metro.activity.open({autoHide: 3000})
                    ">Open</button>

        <button class="button" onclick="
                        Metro.activity.open({
                            type: 'metro',
                            overlayClickClose: true
                        })
                    ">Open</button>

        <button class="button" onclick="
                        var activity = Metro.activity.open({
                            type: 'square',
                            overlayColor: '#fff',
                            overlayAlpha: 1
                        });
                        setTimeout(function(){
                            Metro.activity.close(activity);
                        }, 5000)
                    ">Open</button>

        <button class="button" onclick="
                        Metro.activity.open({
                            type: 'square',
                            overlayColor: '#fff',
                            overlayAlpha: 1,
                            text: '<div class=\'mt-2 text-small\'>Please, wait...</div>',
                            overlayClickClose: true
                        });
                    ">Open</button>
    </div>

    <script src="../lib/metro.js"></script>
    <script>
        $(function(){
        })
    </script>
</body>
</html>
